<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShTerminal - Multi IFrame Viewer</title>

    <meta name="description" content="ShTerminal - Multiple script viewers side-by-side">
    <link rel="icon" href="https://cdn.sdappnet.cloud/rtx/images/sh_terminal.png" type="image/png">
    <link rel="apple-touch-icon" href="https://cdn.sdappnet.cloud/rtx/images/sh_terminal.png" sizes="180x180">
    <link rel="icon" type="image/png" href="https://cdn.sdappnet.cloud/rtx/images/sh_terminal.png" sizes="192x192">
    <link rel="icon" type="image/png" href="https://cdn.sdappnet.cloud/rtx/images/sh_terminal.png" sizes="512x512">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
        }

        /* Resizable Panel Layout */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            /* Prevent scrollbars during resize */
        }

        /* Resizable Panels */
        .panel {
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            min-width: 0;
            /* Allow panels to shrink below content size */
            flex: 0 0 auto;
            /* Don't flex, use fixed widths */
        }

        .resizer {
            width: 8px;
            background: #1e293b;
            cursor: col-resize;
            position: relative;
            z-index: 10;
            flex: 0 0 auto;
            /* Don't flex */
            user-select: none;
            /* Prevent text selection during resize */
            transition: background 0.1s;
        }

        /* Prevent iframe interaction during resize */
        .resizing iframe {
            pointer-events: none !important;
        }

        .resizer:hover {
            background: #334155;
        }

        .resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 30px;
            background: #475569;
            border-radius: 1px;
        }

        /* Panel Header */
        .panel-header {
            background: #1e293b;
            padding: 8px 12px;
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 44px;
            flex-shrink: 0;
        }

        .panel-title {
            font-weight: 600;
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #38bdf8;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Dual Input Section - TWO INPUTS PER PANEL */
        .input-section {
            background: #1e293b;
            padding: 12px;
            border-bottom: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-badge {
            font-weight: 600;
            font-size: 11px;
            min-width: 30px;
            padding: 4px 0;
        }

        .sh-badge {
            color: #fbbf24;
        }

        .rag-badge {
            color: #60a5fa;
        }

        .url-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Consolas', monospace;
            height: 30px;
        }

        .url-input:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .url-input[readonly] {
            background: #1e293b;
            color: #60a5fa;
            cursor: pointer;
        }

        .url-input[readonly]:hover {
            background: #334155;
        }

        .load-btn {
            background: #0e639c;
            border: 1px solid #1177bb;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            height: 30px;
        }

        .load-btn:hover {
            background: #1177bb;
        }

        .copy-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            height: 30px;
        }

        .copy-btn:hover {
            background: #475569;
        }

        /* IFrame Container - ONLY FOR SH, NOT FOR RAG */
        .iframe-container {
            flex: 1;
            position: relative;
            background: #0f172a;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* RAG Link Display Area */
        .rag-display {
            flex: 1;
            background: #0f172a;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        .rag-link-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 24px;
            max-width: 90%;
            text-align: center;
        }

        .rag-link-icon {
            font-size: 32px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .rag-link-url {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #60a5fa;
            word-break: break-all;
            background: #0f172a;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #334155;
            margin: 12px 0;
        }

        .rag-link-note {
            color: #94a3b8;
            font-size: 11px;
        }

        /* Empty state */
        .panel-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            font-size: 12px;
            text-align: center;
            padding: 20px;
        }

        /* Quick Load Bar */
        .quick-load-bar {
            background: #1e293b;
            padding: 6px 12px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 40px;
            flex-shrink: 0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .quick-label {
            color: #94a3b8;
            font-size: 11px;
            white-space: nowrap;
        }

        .quick-url-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Consolas', monospace;
            height: 28px;
        }

        .quick-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #cbd5e1;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            height: 28px;
        }

        .quick-btn:hover {
            background: #475569;
        }

        .quick-btn.primary {
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            border-color: #8b5cf6;
            color: white;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
    </style>
</head>

<body>

                <!-- SH Input Row -->
                <div class="input-row">
                    <span class="input-badge sh-badge">Sh#2</span>
                    <input type="text" class="url-input" id="sh-2"

        <!-- Panel 3 -->
        <div class="panel" id="panel-3">
            <!-- DUAL INPUT SECTION -->
            <div class="input-section">
                <!-- SH Input Row -->
                <div class="input-row">
                    <span class="input-badge sh-badge">Sh#3</span>
                    <input type="text" class="url-input" id="sh-3"

                </div>
            </div>

            <!-- SH Iframe Container -->
            <div class="iframe-container" id="iframe-container-3">
                <div class="panel-empty">
                    <p>Load a script to view with Sh</p>
                </div>
            </div>
        </div>

        <!-- Resizer -->
        <div class="resizer" id="resizer-3"></div>

        <!-- Panel 4 -->
        <div class="panel" id="panel-4">
            <!-- DUAL INPUT SECTION -->
            <div class="input-section">
                <!-- SH Input Row -->
                <div class="input-row">
                    <span class="input-badge sh-badge">Sh#4</span>
                    <input type="text" class="url-input" id="sh-4"
                        placeholder="https://cdn.sdappnet.cloud/rtx/script.sh">
                    <button class="load-btn" onclick="loadShPanel(4)">Load</button>
                    <button class="copy-btn" onclick="resetPanel(4)" title="Reset to default">🗑️</button>
                </div>

                <!-- RAG Input Row (Read-only, shows the link) -->
                <div class="input-row">
                    <span class="input-badge rag-badge">RAG</span>
                    <input type="text" class="url-input" id="rag-4" placeholder="RAG link will appear here" readonly
                        onclick="this.select()">
                    <button class="copy-btn" onclick="copyRagLink(4)">📋 Copy</button>

            <!-- SH Iframe Container -->

    <!-- Quick Load Bar -->
    <div class="quick-load-bar">
        <span class="quick-label">Quick:</span>
        <input type="text" class="quick-url-input" id="quick-url-input" placeholder="Script URL for all panels">
        <button class="quick-btn" onclick="quickLoadAll()">Load to All</button>
        <button class="quick-btn primary" onclick="loadExamples()">Examples</button>
        <button class="quick-btn" onclick="resetAll()">Reset</button>
        <div style="display: flex; align-items: center;">
            <button class="quick-btn" onclick="resetLayout()"
                style="display: flex; align-items: center; gap: 4px; font-size: 12px;">
                <span id="container-count">4</span>
                <img src="https://cdn.sdappnet.cloud/rtx/images/sh_terminal_white.png"
                    style="width: 16px; height: auto;" />
            </button>
        </div>

    <script>
        // Base URLs
        const SH_BASE = 'https://igiteam.github.io/sh/?url=';
        const RAG_BASE = 'https://rag.sdappnet.cloud/?url=';

        // Examples
        const EXAMPLES = [
            'https://cdn.sdappnet.cloud/rtx/winejs.sh',
            'https://cdn.sdappnet.cloud/rtx/winejs-terminal-firefox.sh',
            'https://cdn.sdappnet.cloud/rtx/winejs-terminal-vscode_winejs_packager.sh',
            'https://cdn.sdappnet.cloud/rtx/winejs-terminal-firefox-digitalocean_droplets.sh'
        ];

        const DEFAULT_SH = "https://cdn.sdappnet.cloud/rtx/winejs-welcome.sh"

        // Layout state
        let panelLayout = { w1: 25, w2: 25, w3: 25, w4: 25 };
        let isResizing = false;
        let currentResizer = null;
        let startX = 0;
        let startWidths = [0, 0, 0, 0];
        const minWidths = [300, 300, 300, 300];

        document.addEventListener('DOMContentLoaded', function () {
            updateMinimumWidths();
            initializeLayout();
            setupResizers();
            loadLayout();
            loadFromURLParams();
            loadExamples();
            // Set initial RAG links
            for (let i = 1; i <= 4; i++) {
                updateRagLink(i);
            }
        });


        // Load SH panel
        function loadShPanel(panelNum) {
            const shInput = document.getElementById(`sh-${panelNum}`);
            const container = document.getElementById(`iframe-container-${panelNum}`);

            let url = shInput.value.trim();
            if (!url) return;

            // If user pasted a raw script URL, convert it to Sh format
            if (!url.includes('igiteam.github.io/sh/')) {
                // Ensure URL has protocol
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }

                // Create the full Sh URL with timestamp
                const timestamp = Date.now();
                const shUrl = `${SH_BASE}${encodeURIComponent(url)}&_=${timestamp}`;

                // Update input field to show the full Sh URL
                shInput.value = shUrl;
            } else {
                // If it's already a Sh URL, just add/update timestamp
                const timestamp = Date.now();
                // Remove existing timestamp if any and add new one
                const baseUrl = url.split('&_=')[0];
                shInput.value = `${baseUrl}&_=${timestamp}`;
            }

            // Update RAG link (extract the actual script URL)
            updateRagLink(panelNum);

            // Load iframe with the current input value
            let iframe = container.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                container.innerHTML = '';
                container.appendChild(iframe);
            }
            iframe.src = shInput.value;  // ✅ Use the exact input value

            updateURLParams();
            document.getElementById('container-count').textContent =
                document.querySelectorAll(".iframe-container").length;
        }

        // Update RAG link based on SH input
        function updateRagLink(panelNum) {
            const shInput = document.getElementById(`sh-${panelNum}`);
            const ragInput = document.getElementById(`rag-${panelNum}`);

            let url = shInput.value.trim();
            if (url) {
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }
                const ragUrl = `${RAG_BASE}${encodeURIComponent(url)}`;
                ragInput.value = ragUrl;
            } else {
                ragInput.value = '';
            }
        }

        // Copy RAG link to clipboard
        function copyRagLink(panelNum) {
            const ragInput = document.getElementById(`rag-${panelNum}`);
            if (ragInput.value) {
                navigator.clipboard.writeText(ragInput.value);
                showToast(`📋 RAG link copied from Panel ${panelNum}`);
            }
        }

        // Quick load all panels
        function quickLoadAll() {
            const quickUrlInput = document.getElementById('quick-url-input');
            if (!quickUrlInput) return;
            // Create MEGA RAG link with ALL example URLs
            const panelUrls = [];
            for (let i = 1; i <= 4; i++) {
                const shValue = document.getElementById(`sh-${i}`).value;
                // Extract the actual script URL from Sh URL
                const match = shValue.match(/url=([^&]+)/);
                if (match) {
                    panelUrls.push(decodeURIComponent(match[1]));
                }
            }

            // Build the mega RAG link with all URLs
            let megaRagUrl = 'https://rag.sdappnet.cloud/?';
            panelUrls.forEach((panelUrl, index) => {
                megaRagUrl += `url=${encodeURIComponent(panelUrl)}`;
                if (index < panelUrls.length - 1) megaRagUrl += '&';
            });

            // Add to quick-url input and select it for easy copying
            quickUrlInput.value = megaRagUrl;
            quickUrlInput.select();
            showToast('🎯 MEGA RAG link created! Copy it for AI context');

        }

        // Load examples
        function loadExamples() {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`sh-${i}`).value = EXAMPLES[i - 1];
                updateRagLink(i);
                loadShPanel(i);
            }
        }

        // Reset all
        function resetAll() {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`sh-${i}`).value = DEFAULT_SH;  // ← CHANGE THIS LINE
                updateRagLink(i);  // ← ADD THIS LINE
                loadShPanel(i);    // ← ADD THIS LINE
            }
            // Remove the old code that cleared everything
            window.history.replaceState({}, '', window.location.pathname);  // ← OPTIONAL: remove if you want
        }

        // Reset single panel to default
        function resetPanel(panelNum) {
            document.getElementById(`sh-${panelNum}`).value = DEFAULT_SH;
            updateRagLink(panelNum);
            loadShPanel(panelNum);
            showToast(`🔄 Panel ${panelNum} reset to default`);
        }

        // Load from URL params
        function loadFromURLParams() {
            const params = new URLSearchParams(window.location.search);
            let hasAnyUrl = false;

            for (let i = 1; i <= 4; i++) {
                const url = params.get(`url${i}`);
                if (url) {
                    hasAnyUrl = true;
                    document.getElementById(`sh-${i}`).value = url;
                    updateRagLink(i);
                    loadShPanel(i);
                }
            }

            // If no URLs in params, load default in first panel
            if (!hasAnyUrl) {
                document.getElementById('sh-1').value = DEFAULT_SH;
                updateRagLink(1);
                loadShPanel(1);
            }
        }

        // Update URL params
        function updateURLParams() {
            const params = new URLSearchParams();
            for (let i = 1; i <= 4; i++) {
                const shInput = document.getElementById(`sh-${i}`);
                if (shInput.value) {
                    params.set(`url${i}`, shInput.value);
                }
            }
            const newUrl = `${window.location.pathname}?${params.toString()}`;
            window.history.replaceState({}, '', newUrl);
        }

        // Toast notification
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
                background: #2d2d30; color: white; padding: 12px 24px;
                border-radius: 30px; z-index: 1000; border: 1px solid #3e3e42;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Reset layout to equal 25% widths
        function resetLayout() {
            // Reset to equal distribution
            panelLayout = { w1: 25, w2: 25, w3: 25, w4: 25 };

            // Apply the layout
            initializeLayout();

            // Save to localStorage
            localStorage.setItem('sh_Terminal_Layoutsh_Terminal_Layout_Panels', JSON.stringify(panelLayout));

            // Show confirmation
            showToast('🔄 Layout reset to equal widths');
        }
        // Fix loadLayout function
        function loadLayout() {
            try {
                const saved = localStorage.getItem('sh_Terminal_Layoutsh_Terminal_Layout_Panels');
                if (saved) {
                    const data = JSON.parse(saved);
                    // Validate data
                    if (data.w1 && data.w2 && data.w3 && data.w4) {
                        panelLayout = data;
                        initializeLayout();
                    }
                }
            } catch (e) {
                console.log('Error loading layout:', e);
            }
        }

        // Initialize layout with proper widths
        function initializeLayout() {
            const container = document.querySelector('.app-container');
            if (!container) return;

            const cw = container.clientWidth;

            // Calculate pixel widths from percentages
            const w1 = (cw * panelLayout.w1 / 100);
            const w2 = (cw * panelLayout.w2 / 100);
            const w3 = (cw * panelLayout.w3 / 100);
            const w4 = (cw * panelLayout.w4 / 100);

            // Apply widths
            document.getElementById('panel-1').style.width = w1 + 'px';
            document.getElementById('panel-2').style.width = w2 + 'px';
            document.getElementById('panel-3').style.width = w3 + 'px';
            document.getElementById('panel-4').style.width = w4 + 'px';
        }

        function setupResizers() {
            const resizers = document.querySelectorAll('.resizer');

            resizers.forEach((resizer, index) => {
                // Remove any existing listeners
                resizer.removeEventListener('mousedown', handleResizerMouseDown);
                resizer.addEventListener('mousedown', (e) => handleResizerMouseDown(e, resizer, index));
                resizer.addEventListener('dblclick', (e) => {
                    handleDoubleClick(e, resizer, index);
                });
            });
        }

        // Add this function to handle double-click collapse/expand
        function handleDoubleClick(e, resizer, index) {
            const container = document.querySelector('.app-container');
            if (!container) return;

            const cw = container.clientWidth;
            const panelId = `panel-${index + 1}`;
            const panel = document.getElementById(panelId);

            // Adjust minimum widths
            minWidths[0] = 0;
            minWidths[1] = 0;
            minWidths[2] = 0;
            minWidths[3] = 24; // Panel 4 needs 24px minimum for drag handler

            // Get current widths of all panels
            const panels = [
                document.getElementById('panel-1'),
                document.getElementById('panel-2'),
                document.getElementById('panel-3'),
                document.getElementById('panel-4')
            ];

            const w1 = panels[0].clientWidth;
            const w2 = panels[1].clientWidth;
            const w3 = panels[2].clientWidth;
            const w4 = panels[3].clientWidth;

            // Check if panel is currently closed (width <= minWidth) or open
            if (panel.clientWidth <= minWidths[index]) {
                // EXPAND panel
                const expandSize = Math.min(300, cw * 0.25);
                const oldWidth = panel.clientWidth;
                panel.style.width = expandSize + 'px';

                // Calculate if we need to shrink other panels
                const totalWidth = w1 + w2 + w3 + w4;
                const newTotal = totalWidth + (expandSize - oldWidth);
                const needed = newTotal - cw;

                if (needed > 0) {
                    // Need to shrink panels from RIGHT to LEFT
                    let remaining = needed;

                    // Start from the rightmost panel and work left
                    for (let i = 3; i >= 0; i--) {
                        if (remaining <= 0) break;
                        if (i === index) continue; // Skip the panel we're expanding

                        const currentPanel = panels[i];
                        const currentWidth = currentPanel.clientWidth;
                        const minWidth = minWidths[i];

                        // Skip if panel is already at minimum
                        if (currentWidth <= minWidth) continue;

                        // Calculate how much we can shrink this panel
                        const maxShrink = currentWidth - minWidth;
                        const shrinkAmount = Math.min(remaining, maxShrink);

                        if (shrinkAmount > 0) {
                            currentPanel.style.width = (currentWidth - shrinkAmount) + 'px';
                            remaining -= shrinkAmount;
                        }
                    }

                    // If we still need space, reduce the expansion size
                    if (remaining > 0) {
                        const finalExpandSize = expandSize - remaining;
                        panel.style.width = Math.max(minWidths[index], finalExpandSize) + 'px';
                    }
                }

                showToast('🔓 Panel expanded');

            } else {
                // COLLAPSE panel - find the rightmost panel that can be collapsed
                let panelToCollapse = null;
                let collapseIndex = -1;

                // Look from right to left for a panel that's above its minimum
                for (let i = 3; i >= 0; i--) {
                    const currentPanel = panels[i];
                    const currentWidth = currentPanel.clientWidth;
                    const minWidth = minWidths[i];

                    // Check if panel can be collapsed (width > minimum + small buffer)
                    if (currentWidth > minWidth + 5) {
                        panelToCollapse = currentPanel;
                        collapseIndex = i;
                        break;
                    }
                }

                if (panelToCollapse) {
                    const oldWidth = panelToCollapse.clientWidth;
                    const freedSpace = oldWidth; // Collapse to minimum (0 for most, 24 for panel 4)

                    // Collapse to minimum width
                    panelToCollapse.style.width = minWidths[collapseIndex] + 'px';

                    // Distribute freed space to panels on the LEFT first
                    let remaining = freedSpace;

                    // Give to panels to the left of the collapsed panel
                    for (let i = collapseIndex - 1; i >= 0; i--) {
                        if (remaining <= 0) break;

                        const currentPanel = panels[i];
                        const currentWidth = currentPanel.clientWidth;

                        // Don't give to collapsed panels
                        if (currentWidth <= minWidths[i]) continue;

                        // Add space to this panel (capped at 300px per panel)
                        const addAmount = Math.min(remaining, 300);
                        currentPanel.style.width = (currentWidth + addAmount) + 'px';
                        remaining -= addAmount;
                    }

                    // If still have space, give to rightmost panels (excluding the collapsed one)
                    if (remaining > 0) {
                        for (let i = 3; i >= 0; i--) {
                            if (remaining <= 0) break;
                            if (i === collapseIndex) continue;

                            const currentPanel = panels[i];
                            const currentWidth = currentPanel.clientWidth;

                            if (currentWidth > minWidths[i]) {
                                const addAmount = Math.min(remaining, 200);
                                currentPanel.style.width = (currentWidth + addAmount) + 'px';
                                remaining -= addAmount;
                            }
                        }
                    }

                    showToast('🔒 Panel collapsed');
                } else {
                    showToast('📌 No panels can be collapsed');
                    return;
                }
            }

            // Final validation to ensure all minimum widths are respected
            for (let i = 0; i < panels.length; i++) {
                const currentWidth = panels[i].clientWidth;
                const minWidth = minWidths[i];

                // Ensure minimum widths are enforced for non-zero panels
                if (currentWidth > 0 && currentWidth < minWidth) {
                    panels[i].style.width = minWidth + 'px';
                }
            }

            // Ensure total width doesn't exceed container
            const totalWidth = panels.reduce((sum, p) => sum + p.clientWidth, 0);

            if (totalWidth > cw) {
                // Need to scale down from the right
                let excess = totalWidth - cw;

                for (let i = 3; i >= 0; i--) {
                    if (excess <= 0) break;

                    const currentPanel = panels[i];
                    const currentWidth = currentPanel.clientWidth;
                    const minWidth = minWidths[i];

                    if (currentWidth > minWidth) {
                        const removeAmount = Math.min(excess, currentWidth - minWidth);
                        currentPanel.style.width = (currentWidth - removeAmount) + 'px';
                        excess -= removeAmount;
                    }
                }
            } else if (totalWidth < cw && totalWidth > 0) {
                // Distribute extra space to rightmost panels
                let deficit = cw - totalWidth;

                for (let i = 3; i >= 0; i--) {
                    if (deficit <= 0) break;

                    const currentPanel = panels[i];
                    if (currentPanel.clientWidth > 0) {
                        const addAmount = Math.min(deficit, 200);
                        currentPanel.style.width = (currentPanel.clientWidth + addAmount) + 'px';
                        deficit -= addAmount;
                    }
                }
            }

            // Update layout state
            panelLayout = {
                w1: (panels[0].clientWidth / cw) * 100,
                w2: (panels[1].clientWidth / cw) * 100,
                w3: (panels[2].clientWidth / cw) * 100,
                w4: (panels[3].clientWidth / cw) * 100
            };

            // Save to localStorage
            localStorage.setItem('sh_Terminal_Layoutsh_Terminal_Layout_Panels', JSON.stringify(panelLayout));
        }

        function handleResizerMouseDown(e, resizer, index) {
            e.preventDefault(); // Prevent text selection

            isResizing = true;
            currentResizer = resizer;
            resizer.classList.add('resizing');
            startX = e.clientX;

            // Get current widths
            const panels = [
                document.getElementById('panel-1'),
                document.getElementById('panel-2'),
                document.getElementById('panel-3'),
                document.getElementById('panel-4')
            ];

            startWidths = panels.map(p => p.clientWidth);

            // Add class to body to disable iframe interaction
            document.body.classList.add('resizing');

            // Add event listeners
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', stopResize);

            // Change cursor
            document.body.style.cursor = 'col-resize';
        }

        function handleMouseMove(e) {
            if (!isResizing || !currentResizer) return;

            e.preventDefault();

            const container = document.querySelector('.app-container');
            const cw = container.clientWidth;
            const dx = e.clientX - startX;

            let w1, w2, w3, w4;
            const resizerId = currentResizer.id;

            // Get container rect for boundary calculations
            const containerRect = container.getBoundingClientRect();
            const mouseX = e.clientX - containerRect.left;

            if (resizerId === 'resizer-1') {
                // Resizer between panel 1 and 2
                // Calculate boundaries
                const minX = minWidths[0]; // Minimum width for panel 1
                const maxX = cw - (minWidths[1] + minWidths[2] + minWidths[3]); // Max width for panel 1

                // Clamp the resizer position
                let newWidth1 = Math.max(minX, Math.min(maxX, startWidths[0] + dx));
                let newWidth2 = cw - newWidth1 - startWidths[2] - startWidths[3];

                // Ensure panel 2 doesn't go below minimum
                if (newWidth2 < minWidths[1]) {
                    newWidth2 = minWidths[1];
                    newWidth1 = cw - newWidth2 - startWidths[2] - startWidths[3];
                }

                w1 = newWidth1;
                w2 = newWidth2;
                w3 = startWidths[2];
                w4 = startWidths[3];

            } else if (resizerId === 'resizer-2') {
                // Resizer between panel 2 and 3
                // Calculate boundaries
                const minX = minWidths[0] + minWidths[1]; // Minimum for panels 1+2
                const maxX = cw - (minWidths[2] + minWidths[3]); // Maximum for panels 1+2

                // Clamp the resizer position
                let panels12Width = Math.max(minX, Math.min(maxX, startWidths[0] + startWidths[1] + dx));

                // Distribute between panel 1 and 2 while maintaining their individual minimums
                w1 = Math.max(minWidths[0], startWidths[0]);
                w2 = panels12Width - w1;

                // If panel 2 is too small, adjust panel 1
                if (w2 < minWidths[1]) {
                    w2 = minWidths[1];
                    w1 = panels12Width - w2;
                }

                // If panel 1 is too small after adjustment, force minimum
                if (w1 < minWidths[0]) {
                    w1 = minWidths[0];
                    w2 = panels12Width - w1;
                }

                // Calculate panels 3 and 4
                const panels34Width = cw - panels12Width;
                w3 = Math.max(minWidths[2], startWidths[2] - dx);
                w4 = panels34Width - w3;

                // Ensure panel 4 doesn't go below minimum
                if (w4 < minWidths[3]) {
                    w4 = minWidths[3];
                    w3 = panels34Width - w4;
                }

                // Ensure panel 3 doesn't go below minimum
                if (w3 < minWidths[2]) {
                    w3 = minWidths[2];
                    w4 = panels34Width - w3;
                }

            } else {
                // Resizer between panel 3 and 4
                // Calculate boundaries for the last resizer
                const minX = minWidths[0] + minWidths[1] + minWidths[2]; // Minimum for panels 1+2+3
                const maxX = cw - minWidths[3]; // Maximum for panels 1+2+3 (leaving min for panel 4)

                // Clamp the resizer position
                let panels123Width = Math.max(minX, Math.min(maxX, startWidths[0] + startWidths[1] + startWidths[2] + dx));

                // Panels 1 and 2 stay the same
                w1 = startWidths[0];
                w2 = startWidths[1];

                // Panel 3 takes the remaining from panels123Width
                w3 = panels123Width - w1 - w2;

                // Ensure panel 3 is at least minimum
                if (w3 < minWidths[2]) {
                    w3 = minWidths[2];
                    panels123Width = w1 + w2 + w3;
                }

                // Panel 4 gets the rest
                w4 = cw - panels123Width;

                // Ensure panel 4 is at least minimum
                if (w4 < minWidths[3]) {
                    w4 = minWidths[3];
                    panels123Width = cw - w4;
                    w3 = panels123Width - w1 - w2;

                    // If panel 3 becomes too small, adjust
                    if (w3 < minWidths[2]) {
                        w3 = minWidths[2];
                        panels123Width = w1 + w2 + w3;
                        w4 = cw - panels123Width;
                    }
                }
            }

            // Final safety check - ensure all widths are valid numbers and within bounds
            w1 = Math.max(minWidths[0], Math.min(cw - minWidths[1] - minWidths[2] - minWidths[3], w1 || 0));
            w2 = Math.max(minWidths[1], Math.min(cw - w1 - minWidths[2] - minWidths[3], w2 || 0));
            w3 = Math.max(minWidths[2], Math.min(cw - w1 - w2 - minWidths[3], w3 || 0));
            w4 = Math.max(minWidths[3], cw - w1 - w2 - w3);

            // Apply widths
            document.getElementById('panel-1').style.width = w1 + 'px';
            document.getElementById('panel-2').style.width = w2 + 'px';
            document.getElementById('panel-3').style.width = w3 + 'px';
            document.getElementById('panel-4').style.width = w4 + 'px';

            // Update layout percentages
            panelLayout = {
                w1: (w1 / cw) * 100,
                w2: (w2 / cw) * 100,
                w3: (w3 / cw) * 100,
                w4: (w4 / cw) * 100
            };
        }

        // Add this helper function to update boundaries on window resize
        function updateMinimumWidths() {
            const container = document.querySelector('.app-container');
            if (!container) return;

            const cw = container.clientWidth;

            // Adjust minimum widths based on container size
            // Panel 4 needs 24px minimum for the drag handler
            minWidths[0] = 0;
            minWidths[1] = 0;
            minWidths[2] = 0;
            minWidths[3] = 24; // Keep panel 4 at 24px for drag handler
        }

        function stopResize() {
            if (!isResizing) return;

            isResizing = false;

            if (currentResizer) {
                currentResizer.classList.remove('resizing');
            }

            // Remove class from body
            document.body.classList.remove('resizing');

            // Remove event listeners
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', stopResize);

            // Reset cursor
            document.body.style.cursor = '';

            // Save layout
            localStorage.setItem('sh_Terminal_Layoutsh_Terminal_Layout_Panels', JSON.stringify(panelLayout));

            currentResizer = null;
        }

        // Update the resize event handler
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                updateMinimumWidths();
                initializeLayout();
            }, 100);
        });


        window.addEventListener('resize', initializeLayout);

    <script>
        // Search state
        let searchResults = []; // Array of {panel: 1, line: 42, text: "match", element: node}
        let currentSearchIndex = -1;

        // Add event listener for quick-url-input changes
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('quick-url-input').addEventListener('input', function (e) {
                //do nothing
            });
        });

        // Add keyboard listener for up/down/enter
        document.addEventListener('keydown', function (e) {
            if (e.target.id !== 'quick-url-input') return;

            if (e.key === 'Enter') {
                e.preventDefault();
                const searchText = e.target.value.trim();

                if (searchText.length > 2) {
                    // New search
                    searchWithScroll(searchText);
                } else if (searchResults.length > 0) {
                    // Navigate existing results
                    navigateSearch('next');
                } else {
                    // Clear if no results
                    searchResults = [];
                    currentSearchIndex = -1;
                    clearHighlights();
                }
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                navigateSearch('next');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                navigateSearch('prev');
            }
        });

        // Clear all highlights
        function clearHighlights() {
            document.querySelectorAll('.search-highlight').forEach(el => {
                const text = document.createTextNode(el.textContent);
                el.parentNode.insertBefore(text, el);
                el.parentNode.removeChild(el);
            });
        }

        // Smart search - auto-detects if same domain
        async function searchWithScroll(searchText) {
            if (!searchText) return;

            // Check if first panel's iframe is same domain
            const firstIframe = document.querySelector('#iframe-container-1 iframe');
            let sameDomain = false;

            if (firstIframe) {
                try {
                    // Try to access - will throw error if cross-origin
                    const test = firstIframe.contentDocument;
                    sameDomain = true;
                } catch (e) {
                    sameDomain = false;
                }
            }

            if (sameDomain) {
                console.log('🔍 Same domain - using direct iframe search');
                searchOnSameDomainScroll(searchText);
            } else {
                console.log('🔍 Cross domain - using RAG API search');
                await searchWithRAGScroll(searchText);
            }
        }

        // Direct iframe search (when on same domain)
        function searchOnSameDomainScroll(searchText) {
            searchResults = [];
            const searchLower = searchText.toLowerCase();

            for (let panel = 1; panel <= 4; panel++) {
                const iframe = document.querySelector(`#iframe-container-${panel} iframe`);
                if (!iframe) continue;

                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const lines = iframeDoc.querySelectorAll('.script-line');

                    lines.forEach((line, index) => {
                        const lineContent = line.querySelector('.line-content');
                        if (lineContent && lineContent.textContent.toLowerCase().includes(searchLower)) {
                            searchResults.push({
                                panel: panel,
                                line: index + 1,
                                text: lineContent.textContent.trim(),
                                element: line
                            });
                        }
                    });
                } catch (e) {
                    console.log(`Cannot access iframe ${panel}:`, e);
                }
            }

            // Sort results
            searchResults.sort((a, b) => {
                if (a.panel !== b.panel) return a.panel - b.panel;
                return a.line - b.line;
            });

            // Display results
            if (searchResults.length > 0) {
                currentSearchIndex = 0;
                showToast(`🔍 Found ${searchResults.length} matches`);

                // Automatically scroll to first result in each panel
                scrollToAllResults();
            } else {
                showToast(`🔍 No matches for "${searchText}"`);
            }
        }

        // Scroll to first result in EACH panel
        function scrollToAllResults() {
            // Group results by panel
            const resultsByPanel = {};
            searchResults.forEach(result => {
                if (!resultsByPanel[result.panel]) {
                    resultsByPanel[result.panel] = [];
                }
                resultsByPanel[result.panel].push(result);
            });

            // Scroll to first result in each panel
            for (let panel = 1; panel <= 4; panel++) {
                if (resultsByPanel[panel] && resultsByPanel[panel].length > 0) {
                    const firstResult = resultsByPanel[panel][0];
                    const iframe = document.querySelector(`#iframe-container-${panel} iframe`);

                    if (iframe && firstResult.element) {
                        try {
                            // Scroll within iframe
                            firstResult.element.scrollIntoView({
                                behavior: 'smooth',
                                block: 'center'
                            });

                            // Highlight
                            firstResult.element.style.backgroundColor = '#fbbf24';
                            firstResult.element.style.color = '#000';
                            firstResult.element.classList.add('search-highlight');

                            // Remove highlight after 2 seconds
                            setTimeout(() => {
                                firstResult.element.style.backgroundColor = '';
                                firstResult.element.style.color = '';
                            }, 2000);
                        } catch (e) {
                            console.log(`Cannot scroll in iframe ${panel}:`, e);
                        }
                    }
                }
            }

            // Update quick-url input with summary
            const matchSummary = Object.keys(resultsByPanel).map(panel =>
                `P${panel}: ${resultsByPanel[panel].length}`
            ).join(' • ');

            document.getElementById('quick-url-input').value =
                `🔍 ${searchResults.length} total matches: ${matchSummary}`;

            showToast(`🔍 Scrolled to first match in each panel`);
        }

        // Navigate through search results (UPDATED with iframe scrolling)
        function navigateSearch(direction) {
            if (searchResults.length === 0) {
                showToast('🔍 No search results');
                return;
            }

            if (direction === 'next') {
                currentSearchIndex = (currentSearchIndex + 1) % searchResults.length;
            } else {
                currentSearchIndex = currentSearchIndex - 1;
                if (currentSearchIndex < 0) currentSearchIndex = searchResults.length - 1;
            }

            const result = searchResults[currentSearchIndex];

            // Clear previous highlights
            clearHighlights();

            // Scroll to panel
            const panel = document.getElementById(`panel-${result.panel}`);
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            // If we have direct access to the element (same domain), scroll within iframe
            if (result.element) {
                try {
                    result.element.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });

                    // Highlight
                    result.element.style.backgroundColor = '#fbbf24';
                    result.element.style.color = '#000';
                    result.element.classList.add('search-highlight');
                } catch (e) {
                    console.log('Cannot scroll to element:', e);
                }
            }

            document.getElementById('quick-url-input').value =
                `🔍 ${currentSearchIndex + 1}/${searchResults.length} - Panel ${result.panel}, Line ${result.line}: ${result.text.substring(0, 50)}...`;

            showToast(`🔍 ${currentSearchIndex + 1}/${searchResults.length} - Panel ${result.panel}, Line ${result.line}`);
        }

        // Search in all panels by looking at the Sh URLs
        function searchWithRAGScroll(searchText) {
            if (!searchText) return;

            searchResults = [];

            for (let i = 1; i <= 4; i++) {
                const shInput = document.getElementById(`sh-${i}`);
                if (!shInput || !shInput.value) continue;

                // Extract the script URL from the Sh URL
                const match = shInput.value.match(/url=([^&]+)/);
                if (!match) continue;

                const scriptUrl = decodeURIComponent(match[1]);
                const filename = scriptUrl.split('/').pop();

                // Check if filename contains search text
                if (filename.toLowerCase().includes(searchText.toLowerCase())) {
                    searchResults.push({
                        panel: i,
                        line: 1,
                        text: `Filename: ${filename}`,
                        element: null
                    });
                }

                // For actual script content search, we'd need to fetch the script
                // But that's expensive. Instead, we can use the RAG endpoint!
                fetch(`${RAG_BASE}${encodeURIComponent(scriptUrl)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.chunks) {
                            data.chunks.forEach((chunk, index) => {
                                if (chunk.text.toLowerCase().includes(searchText.toLowerCase())) {
                                    searchResults.push({
                                        panel: i,
                                        line: chunk.line_start || index + 1,
                                        text: chunk.text.substring(0, 100),
                                        element: null
                                    });
                                }
                            });

                            // Sort and display results
                            searchResults.sort((a, b) => {
                                if (a.panel !== b.panel) return a.panel - b.panel;
                                return a.line - b.line;
                            });

                            if (searchResults.length > 0) {
                                currentSearchIndex = 0;
                                showToast(`🔍 Found ${searchResults.length} matches`);
                                navigateSearch('next');
                            }
                        }
                    })
                    .catch(err => {
                        console.log(`Error fetching RAG data for panel ${i}:`, err);
                    });
            }

            // Also show matches in the quick-url input as you type
            const matches = searchResults.map(r => `P${r.panel}:L${r.line}`).join(' • ');
            if (matches) {
                document.getElementById('quick-url-input').placeholder =
                    `🔍 ${searchResults.length} matches: ${matches}`;
            }
        }
    </script>
